<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVLUP: Floor is Lava AR</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #111; }
        /* The WebGL Lava Engine - Z-Index 1 (Bottom) */
        #ar-canvas { width: 100vw; height: 100vh; display: block; position: absolute; top: 0; left: 0; z-index: 1;}
        /* The 2D UI & Safe Zones - Z-Index 2 (Top) */
        #ui-canvas { width: 100vw; height: 100vh; display: block; position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none;}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body>
    <video id="webcam" autoplay playsinline style="display: none;"></video>
    
    <canvas id="ar-canvas"></canvas>
    <canvas id="ui-canvas"></canvas>

    <script type="module" src="app.js"></script>
</body>
</html>
